name: Release Windows Portable

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (for example: v0.2.1)"
        required: true
        type: string
      ref:
        description: "Git ref/sha to build"
        required: false
        default: "main"
        type: string

permissions:
  contents: write

jobs:
  windows-portable:
    name: Build windows-x64 portable
    runs-on: windows-latest
    concurrency:
      group: windows-portable-${{ github.event.inputs.tag }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build Tauri binary
        run: npm run tauri -- build --no-bundle --ci

      - name: Build Windows CLI binary
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin crawli-cli

      - name: Package portable Windows executable
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $zipPath = (& ./packaging/windows/package-portable.ps1 -Tag $tag).Trim()
          "PORTABLE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Create or update release with Windows portable asset
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag }}"
          $version = $tag.TrimStart('v')

          gh release view "$tag" --json tagName > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            gh release create "$tag" `
              --target "${{ github.event.inputs.ref }}" `
              --title "Onion Forger $tag" `
              --notes "Windows portable-only native-Arti release package (no bundled Tor binaries)."
          }

          gh release upload "$tag" "$env:PORTABLE_ZIP" --clobber
          gh release delete-asset "$tag" "crawli_${version}_x64-setup.exe" --yes || $true
          gh release delete-asset "$tag" "crawli_${version}_x64_en-US.msi" --yes || $true

          gh release edit "$tag" --latest
