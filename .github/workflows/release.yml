name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            label: linux-x64
            args: "--bundles appimage,deb,rpm"
          - platform: windows-latest
            label: windows-x64
            args: ""
          - platform: macos-14
            label: macos-x64
            args: "--target x86_64-apple-darwin --bundles app"
          - platform: macos-14
            label: macos-aarch64
            args: "--target aarch64-apple-darwin --bundles app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: startsWith(matrix.platform, 'macos')
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Onion Forger ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            Portable-first multi-platform release artifacts for Onion Forger.
            - Windows: portable executable zip with bundled runtime dependencies
            - macOS: portable .app bundles
            - Linux: portable AppImage + package artifacts
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Package portable Windows executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $portableRoot = "portable-assets/crawli-windows-x64-portable"
          $portableBin = Join-Path $portableRoot "bin"
          New-Item -ItemType Directory -Force -Path $portableBin | Out-Null

          $exe = Get-ChildItem -Path "src-tauri/target" -Recurse -Filter "crawli.exe" |
            Where-Object { $_.FullName -match "\\release\\crawli\.exe$" -and $_.FullName -notmatch "\\deps\\" } |
            Select-Object -First 1
          if (-not $exe) {
            throw "Portable build failed: crawli.exe was not found in src-tauri/target/**/release/"
          }

          Copy-Item -Path $exe.FullName -Destination (Join-Path $portableRoot "crawli.exe") -Force
          Copy-Item -Path "src-tauri/bin/win_x64" -Destination $portableBin -Recurse -Force

          $zipPath = "portable-assets/crawli_${tag}_windows_x64_portable.zip"
          if (Test-Path $zipPath) {
            Remove-Item $zipPath -Force
          }
          Compress-Archive -Path "$portableRoot/*" -DestinationPath $zipPath
          "PORTABLE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Upload portable Windows executable asset
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$env:PORTABLE_ZIP" --clobber

      - name: Package portable Linux AppImage asset
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          appimage="$(find src-tauri/target -type f -name '*.AppImage' | head -n1)"
          if [ -z "$appimage" ]; then
            echo "No AppImage found under src-tauri/target" >&2
            exit 1
          fi
          mkdir -p portable-assets
          out="portable-assets/crawli_${tag}_linux_x64_portable.AppImage"
          cp "$appimage" "$out"
          chmod +x "$out"
          echo "PORTABLE_LINUX_ASSET=$out" >> "$GITHUB_ENV"

      - name: Upload portable Linux AppImage asset
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$PORTABLE_LINUX_ASSET" --clobber

      - name: Package portable macOS app bundle asset
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if [ "${{ matrix.label }}" = "macos-x64" ]; then
            app_path="$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n1)"
            arch="x64"
          else
            app_path="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n1)"
            arch="aarch64"
          fi
          if [ -z "${app_path:-}" ]; then
            echo "No macOS .app bundle found for ${{ matrix.label }}" >&2
            exit 1
          fi
          mkdir -p portable-assets
          out="portable-assets/crawli_${tag}_macos_${arch}_portable.app.tar.gz"
          tar -czf "$out" -C "$(dirname "$app_path")" "$(basename "$app_path")"
          echo "PORTABLE_MAC_ASSET=$out" >> "$GITHUB_ENV"

      - name: Upload portable macOS app bundle asset
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$PORTABLE_MAC_ASSET" --clobber
