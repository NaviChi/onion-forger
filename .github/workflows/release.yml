name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (for example: v0.1.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  bundle:
    name: Build ${{ matrix.label }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            label: linux-x64
            args: "--bundles deb,rpm"
          - platform: windows-latest
            label: windows-x64
            args: ""
          - platform: macos-14
            label: macos-x64
            args: "--target x86_64-apple-darwin --bundles app"
          - platform: macos-14
            label: macos-aarch64
            args: "--target aarch64-apple-darwin --bundles app"

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            src-tauri -> target
          shared-key: release-${{ matrix.label }}

      - name: Add macOS targets
        if: startsWith(matrix.platform, 'macos')
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-24.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libglib2.0-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit --no-fund

      - name: Build and upload release assets
        if: matrix.platform != 'windows-latest'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.event.inputs.tag || github.ref_name }}
          releaseName: Onion Forger ${{ github.event.inputs.tag || github.ref_name }}
          releaseBody: |
            Portable-first multi-platform release artifacts for Onion Forger.
            - Windows: portable executable zip for the native-Arti runtime (no bundled Tor binaries)
            - macOS: portable .app bundles
            - Linux: portable tarball + package artifacts
          releaseDraft: false
          prerelease: false
          includeUpdaterJson: false
          args: ${{ matrix.args }}

      - name: Build Windows binary (no bundle)
        if: matrix.platform == 'windows-latest'
        run: npm run tauri -- build --no-bundle --ci

      - name: Build Windows CLI binary
        if: matrix.platform == 'windows-latest'
        run: cargo build --manifest-path src-tauri/Cargo.toml --release --bin crawli-cli

      - name: Package portable Windows executable
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $zipPath = (& ./packaging/windows/package-portable.ps1 -Tag $tag).Trim()
          "PORTABLE_ZIP=$zipPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Ensure release exists for Windows portable upload
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          gh release view "$tag" --json tagName > $null 2>&1
          if ($LASTEXITCODE -ne 0) {
            gh release create "$tag" `
              --title "Onion Forger $tag" `
              --notes "Portable-first multi-platform release artifacts for Onion Forger."
          }

      - name: Upload portable Windows executable asset
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$env:PORTABLE_ZIP" --clobber

      - name: Remove Windows installer assets (portable-only policy)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          $tag = "${{ github.event.inputs.tag || github.ref_name }}"
          $version = $tag.TrimStart('v')
          gh release delete-asset $tag "crawli_${version}_x64-setup.exe" --yes || $true
          gh release delete-asset $tag "crawli_${version}_x64_en-US.msi" --yes || $true

      - name: Package portable Linux asset
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          portable_root="portable-assets/crawli-linux-x64-portable"
          portable_bin="$(find src-tauri/target -type f -path '*/release/crawli' | head -n1)"
          if [ -z "${portable_bin:-}" ]; then
            echo "No linux release binary found under src-tauri/target/**/release/crawli" >&2
            exit 1
          fi
          mkdir -p "$portable_root/bin"
          cp "$portable_bin" "$portable_root/crawli"
          chmod +x "$portable_root/crawli"
          if [ -d "src-tauri/bin/linux_x64" ]; then
            cp -R src-tauri/bin/linux_x64 "$portable_root/bin/"
          fi
          out="portable-assets/crawli_${tag}_linux_x64_portable.tar.gz"
          tar -czf "$out" -C portable-assets "$(basename "$portable_root")"
          echo "PORTABLE_LINUX_ASSET=$out" >> "$GITHUB_ENV"

      - name: Upload portable Linux asset
        if: matrix.platform == 'ubuntu-24.04'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$PORTABLE_LINUX_ASSET" --clobber

      - name: Package portable macOS app bundle asset
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ github.event.inputs.tag || github.ref_name }}"
          if [ "${{ matrix.label }}" = "macos-x64" ]; then
            app_path="$(find src-tauri/target/x86_64-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n1)"
            arch="x64"
          else
            app_path="$(find src-tauri/target/aarch64-apple-darwin/release/bundle/macos -maxdepth 1 -type d -name '*.app' | head -n1)"
            arch="aarch64"
          fi
          if [ -z "${app_path:-}" ]; then
            echo "No macOS .app bundle found for ${{ matrix.label }}" >&2
            exit 1
          fi
          mkdir -p portable-assets
          out="portable-assets/crawli_${tag}_macos_${arch}_portable.app.tar.gz"
          tar -czf "$out" -C "$(dirname "$app_path")" "$(basename "$app_path")"
          echo "PORTABLE_MAC_ASSET=$out" >> "$GITHUB_ENV"

      - name: Upload portable macOS app bundle asset
        if: startsWith(matrix.platform, 'macos')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.event.inputs.tag || github.ref_name }}" "$PORTABLE_MAC_ASSET" --clobber
